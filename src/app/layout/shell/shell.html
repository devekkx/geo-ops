<div class="flex h-screen overflow-hidden">
  <aside class="bg-brand-blue-900 flex w-62 shrink-0 flex-col gap-1 px-4 py-5">
    <div class="flex items-center gap-3 px-2 pb-5">
      <div class="flex flex-col gap-1" aria-hidden="true">
        <span class="bg-brand-orange-500 block h-0.5 w-5 rounded-full"></span>
        <span class="bg-brand-orange-500 block h-0.5 w-5 rounded-full"></span>
        <span class="bg-brand-orange-500 block h-0.5 w-5 rounded-full"></span>
      </div>
      <div class="leading-tight">
        <div class="text-base font-bold tracking-wide text-white">AmaliTech</div>
        <div class="text-xs text-white/55">Facility Manager</div>
      </div>
    </div>

    <div class="px-3 pt-2 pb-1.5 text-xs font-semibold tracking-wider text-white/40 uppercase">
      Workspace
    </div>
    <nav class="flex flex-col gap-1">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-white/10 text-white"
          [routerLinkActiveOptions]="{ exact: item.path === '/facilities' }"
          class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-white/70 hover:bg-white/5 hover:text-white"
        >
          <svg
            width="19"
            height="19"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path [attr.d]="item.iconPath" />
          </svg>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="mt-auto flex items-center gap-3 rounded-xl bg-white/5 p-3">
      <span
        class="bg-brand-orange-500 flex size-8.5 shrink-0 items-center justify-center rounded-full text-xs font-semibold text-white"
        aria-hidden="true"
        >{{ initials() }}</span
      >
      <div class="min-w-0 flex-1">
        <div class="truncate text-sm font-medium text-white">{{ user()?.displayName }}</div>
        <div class="text-xs text-white/50">Operations</div>
      </div>
      <button
        mat-icon-button
        type="button"
        (click)="onLogout()"
        aria-label="Sign out"
        class="!text-white/55 hover:!text-white"
      >
        <svg
          width="17"
          height="17"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <path d="M16 17l5-5-5-5" />
          <path d="M21 12H9" />
        </svg>
      </button>
    </div>
  </aside>

  <div class="flex min-w-0 flex-1 flex-col bg-gray-50">
    <header
      class="flex h-16 shrink-0 items-center justify-between border-b border-gray-200 bg-white px-7"
    >
      <div>
        <h1 class="text-brand-blue-900 text-lg font-semibold">{{ pageTitle() }}</h1>
        @if (pageSubtitle()) {
          <p class="mt-0.5 text-xs text-gray-500">{{ pageSubtitle() }}</p>
        }
      </div>
      <div class="flex items-center gap-3.5">
        <button
          mat-flat-button
          type="button"
          (click)="onNewFacility()"
          class="!bg-brand-orange-500 !text-white"
        >
          <svg
            width="17"
            height="17"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 5v14" />
            <path d="M5 12h14" />
          </svg>
          New facility
        </button>
        <span
          class="bg-brand-blue-900 flex size-9.5 items-center justify-center rounded-full text-xs font-semibold text-white"
          aria-hidden="true"
          >{{ initials() }}</span
        >
      </div>
    </header>

    <main class="flex-1 overflow-auto px-7 py-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
