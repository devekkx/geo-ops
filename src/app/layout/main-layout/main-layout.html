<div class="flex h-screen overflow-hidden">
  @if (navOpen()) {
    <div
      class="fixed inset-0 z-30 bg-black/40 lg:hidden"
      (click)="closeNav()"
      keydown.escape="closeNav()"
      aria-hidden="true"
    ></div>
  }

  <aside
    class="bg-brand-blue-900 fixed inset-y-0 left-0 z-40 flex w-62 shrink-0 -translate-x-full flex-col gap-1 px-4 py-5 transition-transform duration-200 lg:static lg:translate-x-0"
    [class.translate-x-0]="navOpen()"
  >
    <div class="flex items-center gap-3 px-2 pb-5">
      <div aria-hidden="true" class="flex flex-col gap-1">
        <img src="logo.png" alt="logo" class="h-10 w-10" />
      </div>
      <div class="leading-tight">
        <div class="font-display text-base font-bold tracking-wide text-white">GeoOps</div>
        <div class="text-xs text-white/55">Facility Manager</div>
      </div>
      <button
        (click)="closeNav()"
        aria-label="Close menu"
        class="ml-auto text-white/55! hover:text-white! lg:hidden!"
        mat-icon-button
        type="button"
      >
        <mat-icon svgIcon="close" class="h-4.25! w-4.25!" aria-hidden="true" />
      </button>
    </div>

    <div class="px-3 pt-2 pb-1.5 text-xs font-semibold tracking-wider text-white/40 uppercase">
      Workspace
    </div>
    <nav class="flex flex-col gap-1">
      @for (item of navItems; track item.path) {
        <a
          [routerLinkActiveOptions]="{ exact: item.path === '/facilities' }"
          [routerLink]="item.path"
          class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-white/70 hover:bg-white/5 hover:text-white"
          routerLinkActive="bg-white/10 text-white"
          (click)="closeNav()"
        >
          <mat-icon [svgIcon]="item.icon" class="h-4.75! w-4.75!" aria-hidden="true" />
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="mt-auto flex items-center gap-3 rounded-xl bg-white/5 p-3">
      <span
        aria-hidden="true"
        class="bg-brand-orange-500 flex size-8.5 shrink-0 items-center justify-center rounded-full text-xs font-semibold text-white"
        >{{ initials() }}</span
      >
      <div class="min-w-0 flex-1">
        <div class="truncate text-sm font-medium text-white">{{ user()?.displayName }}</div>
        <div class="text-xs text-white/50">Operations</div>
      </div>
      <button
        (click)="onLogout()"
        aria-label="Sign out"
        class="text-white/55! hover:text-white!"
        mat-icon-button
        type="button"
      >
        <img class="invert-100" src="icons/logout.svg" alt="logout" />
      </button>
    </div>
  </aside>

  <div class="bg-brand-gray-50 flex min-w-0 flex-1 flex-col">
    <header
      class="border-brand-gray-200 flex h-16 shrink-0 items-center justify-between gap-3 border-b bg-white px-4 lg:px-7"
    >
      <div class="flex min-w-0 items-center gap-2">
        <button
          (click)="toggleNav()"
          aria-label="Open menu"
          class="text-brand-gray-500! shrink-0 lg:hidden!"
          mat-icon-button
          type="button"
        >
          <mat-icon svgIcon="menu" class="h-4.75! w-4.75!" aria-hidden="true" />
        </button>
        <div class="min-w-0">
          <h1 class="text-brand-blue-900 font-display truncate text-lg font-semibold">
            {{ pageTitle() }}
          </h1>
          @if (pageSubtitle()) {
            <p class="text-brand-gray-500 mt-0.5 hidden truncate text-xs sm:block">
              {{ pageSubtitle() }}
            </p>
          }
        </div>
      </div>
      <div class="flex shrink-0 items-center gap-3.5">
        <button
          (click)="onNewFacility()"
          class="bg-brand-orange-500! text-white!"
          title="New facility"
          mat-flat-button
          type="button"
        >
          <mat-icon svgIcon="plus" class="h-4.25! w-4.25!" aria-hidden="true" />
          <span class="hidden sm:inline">New facility</span>
        </button>
        <span
          aria-hidden="true"
          class="bg-brand-blue-900 hidden size-9.5 items-center justify-center rounded-full text-xs font-semibold text-white sm:flex"
          >{{ initials() }}</span
        >
      </div>
    </header>

    <main class="flex-1 overflow-auto px-4 py-4 lg:px-7 lg:py-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
