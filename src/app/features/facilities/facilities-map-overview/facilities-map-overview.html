@switch (state()) {
  @case ("loading") {
    <div
      class="text-brand-gray-500 flex h-[calc(100vh-64px-52px)] items-center justify-center text-sm"
    >
      Loading facilities…
    </div>
  }
  @case ("error") {
    <div
      class="flex h-[calc(100vh-64px-52px)] flex-col items-center justify-center gap-4 text-center"
    >
      <p class="text-brand-blue-900 m-0 text-lg font-semibold">Couldn't load facilities</p>
      <p class="text-brand-gray-500 m-0 max-w-100 text-sm">{{ errorMessage() }}</p>
      <button
        class="bg-brand-orange-500 inline-flex h-10 items-center justify-center rounded-md px-4.5 text-sm font-medium text-white"
        type="button"
        (click)="onRetry()"
      >
        Retry
      </button>
    </div>
  }
  @case ("loaded") {
    <div
      class="grid h-[calc(100vh-64px-52px)] grid-cols-1 gap-5 md:grid-cols-[328px_minmax(0,1fr)]"
    >
      <div
        class="border-brand-gray-200 flex flex-col overflow-hidden rounded-xl border bg-white shadow-sm"
      >
        <div
          class="border-brand-gray-200 flex shrink-0 items-center justify-between border-b px-4.5 py-4"
        >
          <div class="text-brand-blue-900 font-display text-[15px] font-semibold">
            All facilities
          </div>
          <span
            class="bg-brand-gray-100 text-brand-gray-500 rounded-full px-2.5 py-0.5 text-xs font-semibold"
            >{{ count() }}</span
          >
        </div>
        <div class="flex-1 overflow-auto">
          @for (facility of facilities(); track facility.id) {
            <div
              class="border-brand-gray-100 hover:bg-brand-gray-50 flex w-full items-center gap-3 border-b pr-4"
              [class.bg-brand-gray-50]="facility.id === selectedId()"
            >
              <button
                type="button"
                class="flex min-w-0 flex-1 items-center gap-3 py-3.25 pl-4 text-left"
                [attr.aria-pressed]="facility.id === selectedId()"
                (click)="onSelect(facility.id)"
              >
                <geo-status-badge [status]="facility.status" />
                <span class="min-w-0 flex-1">
                  <span class="text-brand-blue-900 block truncate text-sm font-semibold">{{
                    facility.name
                  }}</span>
                  <span class="text-brand-gray-500 block text-xs"
                    >{{ facility.type }} · {{ facility.region }}</span
                  >
                </span>
              </button>
              <a
                [routerLink]="['/facilities', facility.id]"
                class="text-brand-blue-600 shrink-0 text-xs font-semibold hover:underline"
                >View</a
              >
            </div>
          }
        </div>
      </div>

      <div class="border-brand-gray-200 overflow-hidden rounded-xl border bg-white shadow-sm">
        <geo-facility-map
          [facilities]="facilities()"
          [selectedId]="selectedId()"
          (markerClick)="onSelect($event)"
        />
      </div>
    </div>
  }
}
